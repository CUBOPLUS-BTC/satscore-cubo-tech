services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: magma-backend:latest
    container_name: magma_backend
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M

  db:
    image: postgres:16-alpine
    container_name: magma_db
    restart: always
    environment:
      POSTGRES_DB: magma
      POSTGRES_USER: magma
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me-in-prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U magma"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  default:
    name: magma-network
